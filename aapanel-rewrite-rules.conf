# ============================================================
# AAPanel Rewrite Rules for news.evaulthub.com
#
# HOW TO APPLY IN AAPANEL:
#   1. Log in to AAPanel
#   2. Go to: Website → click site name → Config → URL Rewrite
#      (or: Website → click "Set" → Rewrite)
#   3. Select "Custom" or paste these rules in the text box
#   4. Click Save
# ============================================================

# Match pretty URLs: /match/some-slug → match.php?slug=some-slug
location ~ ^/match/([a-z0-9\-]+)/?$ {
    try_files $uri /match.php?slug=$1;
}

# Admin routes
location ~ ^/admin/?$ {
    rewrite ^ /admin/index.php last;
}
location ~ ^/admin/dashboard/?$ {
    rewrite ^ /admin/dashboard.php last;
}
location ~ ^/admin/login/?$ {
    rewrite ^ /admin/login.php last;
}
location ~ ^/admin/logout/?$ {
    rewrite ^ /admin/logout.php last;
}
location ~ ^/admin/import/?$ {
    rewrite ^ /admin/import.php last;
}
location ~ ^/admin/import/fetch/?$ {
    rewrite ^ /admin/import-fetch.php last;
}
location ~ ^/admin/import/store/?$ {
    rewrite ^ /admin/import-store.php last;
}
location ~ ^/admin/matches/?$ {
    rewrite ^ /admin/matches.php last;
}
location ~ ^/admin/matches/create/?$ {
    rewrite ^ /admin/match-create.php last;
}
location ~ ^/admin/matches/([0-9]+)/edit/?$ {
    rewrite ^/admin/matches/([0-9]+)/edit/?$ /admin/match-edit.php?id=$1 last;
}
location ~ ^/admin/matches/([0-9]+)/delete/?$ {
    rewrite ^/admin/matches/([0-9]+)/delete/?$ /admin/match-delete.php?id=$1 last;
}
location ~ ^/admin/matches/([0-9]+)/restore/?$ {
    rewrite ^/admin/matches/([0-9]+)/restore/?$ /admin/match-restore.php?id=$1 last;
}
location ~ ^/admin/analytics/?$ {
    rewrite ^ /admin/analytics.php last;
}

# API
location ~ ^/api/track-view/?$ {
    rewrite ^ /api/track-view.php last;
}
