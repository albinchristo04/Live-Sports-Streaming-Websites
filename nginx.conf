##############################################################
# Nginx Server Block — Live Sports Streaming
# Domain: news.evaulthub.com
#
# INSTALL:
#   1. Copy this file to /etc/nginx/sites-available/news.evaulthub.com
#   2. ln -s /etc/nginx/sites-available/news.evaulthub.com /etc/nginx/sites-enabled/
#   3. Update 'root' path and 'fastcgi_pass' socket below
#   4. nginx -t && systemctl reload nginx
##############################################################

server {
    listen 80;
    listen [::]:80;
    server_name news.evaulthub.com www.news.evaulthub.com;

    # Redirect HTTP → HTTPS (remove these 3 lines if SSL not yet set up)
    # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name news.evaulthub.com www.news.evaulthub.com;

    # ── SSL (update paths to your certificate) ─────────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/news.evaulthub.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/news.evaulthub.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Web root ────────────────────────────────────────────────────────────────
    root  /var/www/html;       # <-- update to your actual web root
    index index.php index.html;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                    always;
    add_header X-Frame-Options         "SAMEORIGIN"                 always;
    add_header X-XSS-Protection        "1; mode=block"              always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Block directory listings ─────────────────────────────────────────────────
    autoindex off;

    # ── Block access to sensitive files ─────────────────────────────────────────
    location ~* \.(sql|log|env|md)$ {
        deny all;
        return 404;
    }

    # ── Block direct access to PHP includes/importers ────────────────────────────
    location ~ ^/(includes|importers|config|sql)/ {
        deny all;
        return 404;
    }

    # ── Ads.txt ──────────────────────────────────────────────────────────────────
    location = /ads.txt {
        try_files $uri =404;
    }

    # ── Static assets (CSS/JS/images) ────────────────────────────────────────────
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Match pretty URLs: /match/slug → match.php?slug=slug ─────────────────────
    location ~ ^/match/([a-z0-9\-]+)/?$ {
        try_files $uri /match.php?slug=$1&$args;
    }

    # ── API ──────────────────────────────────────────────────────────────────────
    location = /api/track-view {
        try_files $uri /api/track-view.php$is_args$args;
    }

    # ── Admin routes ─────────────────────────────────────────────────────────────
    location = /admin {
        return 301 /admin/dashboard;
    }
    location = /admin/ {
        return 301 /admin/dashboard;
    }
    location ~ ^/admin/dashboard/?$ {
        try_files $uri /admin/dashboard.php;
    }
    location ~ ^/admin/import/?$ {
        try_files $uri /admin/import.php;
    }
    location ~ ^/admin/import/fetch/?$ {
        try_files $uri /admin/import-fetch.php;
    }
    location ~ ^/admin/import/store/?$ {
        try_files $uri /admin/import-store.php;
    }
    location ~ ^/admin/matches/?$ {
        try_files $uri /admin/matches.php;
    }
    location ~ ^/admin/matches/create/?$ {
        try_files $uri /admin/match-create.php;
    }
    location ~ ^/admin/matches/([0-9]+)/edit/?$ {
        try_files $uri /admin/match-edit.php?id=$1&$args;
    }
    location ~ ^/admin/matches/([0-9]+)/delete/?$ {
        try_files $uri /admin/match-delete.php?id=$1&$args;
    }
    location ~ ^/admin/matches/([0-9]+)/restore/?$ {
        try_files $uri /admin/match-restore.php?id=$1&$args;
    }
    location ~ ^/admin/analytics/?$ {
        try_files $uri /admin/analytics.php;
    }
    location ~ ^/admin/login/?$ {
        try_files $uri /admin/login.php;
    }
    location ~ ^/admin/logout/?$ {
        try_files $uri /admin/logout.php;
    }

    # ── PHP-FPM ──────────────────────────────────────────────────────────────────
    location ~ \.php$ {
        # Adjust socket path to match your PHP-FPM version
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;   # e.g. php8.1-fpm.sock or php8.3-fpm.sock
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE      "display_errors=Off\nsession.cookie_httponly=1\nsession.cookie_samesite=Lax";
        fastcgi_read_timeout 60;
    }

    # ── Default fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
}
